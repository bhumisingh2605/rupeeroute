name: RupeeRoute CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rupeeroute_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run expense-service tests
        run: mvn test -pl expense-service
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/rupeeroute_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Run settlement-service tests
        run: mvn test -pl settlement-service

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          mvn clean package -pl expense-service -DskipTests
          mvn clean package -pl settlement-service -DskipTests
          mvn clean package -pl notification-service -DskipTests
          mvn clean package -pl api-gateway -DskipTests

      - name: Build Docker images
        run: |
          docker build -t rupeeroute-expense-service ./expense-service
          docker build -t rupeeroute-settlement-service ./settlement-service
          docker build -t rupeeroute-notification-service ./notification-service
          docker build -t rupeeroute-api-gateway ./api-gateway

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: '**/target/*.jar'
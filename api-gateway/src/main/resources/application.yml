spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: expense-service
              uri: ${EXPENSE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/expenses/**, /api/groups/**, /api/users/**, /api/auth/**
              filters:
                - JwtAuthFilter

            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/settlements/**
              filters:
                - JwtAuthFilter

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}